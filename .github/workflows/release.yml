name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build App
        run: |
          xcodebuild build \
            -project BetterMonitor.xcodeproj \
            -scheme BetterMonitor \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive App
        run: |
          cd build/Build/Products/Release
          zip -r BetterMonitor.zip BetterMonitor.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/BetterMonitor.zip
          generate_release_notes: true
