name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build App
        run: |
          xcodebuild build \
            -project BetterMonitor.xcodeproj \
            -scheme BetterMonitor \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build CLI
        run: |
          xcodebuild build \
            -project BetterMonitor.xcodeproj \
            -target BetterMonitorCLI \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
