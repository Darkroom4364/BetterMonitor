name: Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  build:
    needs: lint
    strategy:
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build App
        run: |
          xcodebuild build \
            -project BetterMonitor.xcodeproj \
            -scheme BetterMonitor \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build CLI
        run: |
          xcodebuild build \
            -project BetterMonitor.xcodeproj \
            -target BetterMonitorCLI \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -project BetterMonitor.xcodeproj \
            -scheme BetterMonitor \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO || true
